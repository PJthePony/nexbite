<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Supabase Email Template Preview</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
    }
    .preview-label {
      font-size: 14px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: -40px;
    }
  </style>
</head>
<body>

<div class="preview-label">Confirmation Email (with new logo)</div>

<div style="width:100%;max-width:500px;">
  <div style="background:#475569;border-radius:12px 12px 0 0;padding:30px;text-align:center;">
    <img src="public/logo-email.png" width="40" height="38" alt="tanzillo.ai" style="display:inline-block;border-radius:6px;" />
    <p style="margin:12px 0 0;color:#fff;font-size:18px;font-weight:600;font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">tanzillo.ai</p>
  </div>
  <div style="background:#fff;padding:32px 24px;font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;text-align:center;border-radius:0 0 12px 12px;">
    <p style="margin:0 0 8px;font-size:16px;color:#0f172a;font-weight:600;">Welcome to tanzillo.ai</p>
    <p style="margin:0 0 24px;font-size:14px;color:#94a3b8;">Confirm your email to get started.</p>
    <a href="#" style="display:inline-block;background:#475569;color:#fff;text-decoration:none;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;">Confirm Email</a>
    <p style="margin:24px 0 0;font-size:12px;color:#94a3b8;">If you didn't sign up, you can safely ignore this email.</p>
  </div>
</div>

</body>
</html>
